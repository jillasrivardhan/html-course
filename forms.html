</head>
<style>

    background-color: aquamarine;
    display: flex;

    height: 100vh;

    
  }

  }

    <form>

      <label for="name">Name</label>

      <label for="password">password</label>

      <button type="submit" onclick="submit">submit</button>
    </form>
  
    
</body>
